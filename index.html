<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Evan Gold</title>
<link rel="stylesheet" href="css/style.css">
<style>
  .hero {
    padding: 0;
    height: 70vh;
    min-height: 480px;
    position: relative;
    overflow: hidden;
    background: var(--paper-dark) center / cover no-repeat;
  }
  .hero-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.55));
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .hero-overlay.visible { opacity: 1; }
  .hero-content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100%;
  }
  .hero-content h1 {
    color: var(--ink);
    transition: color 0.6s ease;
  }
  .hero-overlay.visible ~ .hero-content h1 {
    color: #fff;
    text-shadow: 0 1px 6px rgba(0, 0, 0, 0.5);
  }
  .hero-caption {
    position: absolute;
    right: 16px;
    bottom: 14px;
    z-index: 1;
    color: rgba(255, 255, 255, 0.85);
    font-size: 0.8rem;
    text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
    opacity: 0;
    transition: opacity 0.6s ease;
  }
  .hero-caption.visible { opacity: 1; }
</style>
</head>
<body>

<header class="site-header">
  <div class="brand">Evan Gold</div>
  <nav>
    <a href="projects.html">Projects</a>
    <a href="notes.html">Notes</a>
    <a href="links.html">Links</a>
  </nav>
</header>

<section class="hero" id="hero">
  <div class="hero-overlay" id="hero-overlay"></div>
  <div class="hero-content">
    <h1>Evan Gold</h1>
  </div>
  <div class="hero-caption" id="hero-caption"></div>
</section>

<footer class="site-footer">
  &copy; <span id="year"></span> Evan Gold
</footer>

<script src="js/daily-photo.js"></script>
<script src="js/main.js"></script>
<script>document.getElementById('year').textContent = new Date().getFullYear();</script>
</body>
</html>
